# 🔴 The Oracle's Memory Bank (Redis)
# "I'm not here to tell you how this is going to end.
#  I'm here to tell you how it's going to begin." - The Oracle
#
# This is the protected data store that only authorized
# crew members (Neo) can access.
#
---
apiVersion: v1
kind: Namespace
metadata:
  name: matrix
  labels:
    zone: zion
    security: maximum
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: the-oracle
  namespace: matrix
  labels:
    app: the-oracle
    role: memory-bank
    movie: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: the-oracle
  template:
    metadata:
      labels:
        app: the-oracle
        role: memory-bank
        character: oracle
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: the-oracle
  namespace: matrix
  labels:
    app: the-oracle
spec:
  selector:
    app: the-oracle
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  type: ClusterIP
