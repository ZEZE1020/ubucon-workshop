# 🦸 Neo - The One (FastAPI Backend)
# "I know you're out there. I can feel you now.
#  I know that you're afraid. You're afraid of us.
#  You're afraid of change." - Neo
#
# Neo is the legitimate backend service that is
# ALLOWED to communicate with The Oracle (Redis).
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo
  namespace: matrix
  labels:
    app: neo
    role: the-one
    movie: matrix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neo
  template:
    metadata:
      labels:
        app: neo
        role: the-one
        character: neo
        trusted: "true"
    spec:
      containers:
      - name: fastapi
        image: python:3.10-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install fastapi uvicorn redis --quiet
          cat > /app/main.py << 'PYEOF'
          from fastapi import FastAPI
          import redis
          import os

          app = FastAPI(title="Neo - The One")

          @app.get("/")
          def root():
              return {"character": "Neo", "status": "I know kung fu", "mission": "Free humanity"}

          @app.get("/oracle")
          def consult_oracle():
              try:
                  r = redis.Redis(host='the-oracle', port=6379, decode_responses=True)
                  r.set('prophecy', 'The One will end the war')
                  prophecy = r.get('prophecy')
                  return {"oracle_says": prophecy, "status": "Connection successful"}
              except Exception as e:
                  return {"error": str(e), "status": "The Oracle is unreachable"}

          @app.get("/health")
          def health():
              return {"status": "ready", "quote": "There is no spoon"}
          PYEOF
          uvicorn /app/main:app --host 0.0.0.0 --port 8000
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: neo
  namespace: matrix
  labels:
    app: neo
spec:
  selector:
    app: neo
  ports:
  - port: 80
    targetPort: 8000
    name: http
  type: ClusterIP
