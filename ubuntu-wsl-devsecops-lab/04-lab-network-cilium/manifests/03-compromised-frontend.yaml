---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-smith
  namespace: matrix
  labels:
    app: agent-smith
    role: threat-actor
    movie: matrix
  annotations:
    description: "Simulated compromised pod for security demo"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-smith
  template:
    metadata:
      labels:
        app: agent-smith
        role: threat-actor
        character: smith
        trusted: "false"
    spec:
      containers:
      - name: attacker
        image: alpine/curl:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo '🕵️ Agent Smith activated...'
          echo '"Mr. Anderson... welcome back."'
          echo ''
          echo 'Attempting to breach The Oracle...'
          echo '================================'
          while true; do
            echo "[$(date '+%H:%M:%S')] Attempting Redis connection..."
            # Try to connect to Redis (this should be BLOCKED by Cilium)
            timeout 3 sh -c 'echo PING | nc -v the-oracle 6379' 2>&1 || echo "❌ Connection BLOCKED by Cilium!"
            echo "[$(date '+%H:%M:%S')] Attempting HTTP to Neo..."
            curl -s --max-time 3 http://neo/health 2>&1 || echo "❌ Connection BLOCKED!"
            echo '---'
            sleep 10
          done
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
