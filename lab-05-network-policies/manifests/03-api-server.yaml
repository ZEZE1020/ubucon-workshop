# API Server - Trusted Backend Service
# This service IS ALLOWED to communicate with Redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: network-lab
  labels:
    app: api-server
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        tier: backend
        trusted: "true"
    spec:
      containers:
      - name: api
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install fastapi uvicorn redis --quiet
          cat > /app/main.py << 'PYEOF'
          from fastapi import FastAPI
          import redis
          import os

          app = FastAPI(title="API Server")

          @app.get("/")
          def root():
              return {"service": "api-server", "status": "running"}

          @app.get("/data")
          def get_data():
              try:
                  r = redis.Redis(host='redis-backend', port=6379, decode_responses=True)
                  r.set('test_key', 'Hello from API Server!')
                  value = r.get('test_key')
                  return {"redis_response": value, "status": "connected"}
              except Exception as e:
                  return {"error": str(e), "status": "connection_failed"}

          @app.get("/health")
          def health():
              return {"status": "healthy"}
          PYEOF
          uvicorn /app/main:app --host 0.0.0.0 --port 8000
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: network-lab
  labels:
    app: api-server
spec:
  selector:
    app: api-server
  ports:
  - port: 80
    targetPort: 8000
    name: http
  type: ClusterIP
