# Redis Backend - The Protected Resource
# This database should only be accessible by trusted services
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-backend
  namespace: network-lab
  labels:
    app: redis-backend
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-backend
  template:
    metadata:
      labels:
        app: redis-backend
        tier: database
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: redis-backend
  namespace: network-lab
  labels:
    app: redis-backend
spec:
  selector:
    app: redis-backend
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  type: ClusterIP
